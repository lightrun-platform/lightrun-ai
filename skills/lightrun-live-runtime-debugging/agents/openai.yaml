interface:
  display_name: "Lightrun Live Runtime Debugging"
  short_description: "Investigate live runtime issues with deterministic evidence capture"
  icon_small: "./assets/lightrun-small.svg"
  icon_large: "./assets/lightrun.png"
  brand_color: "#0078D4"
  default_prompt: "Use $lightrun-live-runtime-debugging to run a deterministic live runtime investigation with mandatory preflight, evidence-first capture, and explicit blocker/handoff output."

dependencies:
  tools:
    - type: "mcp"
      value: "lightrun"
      description: "Lightrun MCP server"
      transport: "streamable_http"
      url: "https://app.lightrun.com/mcp"
